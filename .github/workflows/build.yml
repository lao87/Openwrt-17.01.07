name: Build OpenWrt 17.01.7 MR3220v2 (Final Optimized)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev file python3-distutils time rsync wget

      - name: Download Image Builder 17.01.7
        run: |
          wget https://downloads.openwrt.org/releases/17.01.7/targets/ar71xx/generic/openwrt-imagebuilder-17.01.7-ar71xx-generic.Linux-x86_64.tar.xz
          tar xf openwrt-imagebuilder-17.01.7-ar71xx-generic.Linux-x86_64.tar.xz

      - name: Build Firmware
        run: |
          cd openwrt-imagebuilder-17.01.7-ar71xx-generic.Linux-x86_64
          
          # Paket Inti:
          # 1. LuCI (Web Admin)
          # 2. USB Tethering Android (RNDIS only)
          # 3. Extroot Support (Block-mount, FS drivers)
          # 4. WiFi Support (Ath9k driver + Wpad-mini for WPA encryption)
          # 5. Hapus Paket Berat (IPv6, PPPoE)
          
          make image PROFILE=TL-MR3220-v2 PACKAGES="\
            luci luci-base luci-mod-network luci-mod-status luci-mod-system luci-theme-bootstrap \
            kmod-usb-core kmod-usb2 kmod-usb-ohci \
            kmod-usb-net-rndis \
            block-mount kmod-fs-ext4 kmod-fs-vfat fdisk \
            kmod-ath9k wpad-mini \
            -ppp -ppp-mod-pppoe -kmod-ppp -kmod-pppoe \
            -odhcp6c -odhcpd -ip6tables -kmod-ip6tables \
            -relayd \
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: OpenWrt-17.01.7-MR3220v2-Final
          path: openwrt-imagebuilder-17.01.7-ar71xx-generic.Linux-x86_64/bin/targets/ar71xx/generic/*squashfs*
          
